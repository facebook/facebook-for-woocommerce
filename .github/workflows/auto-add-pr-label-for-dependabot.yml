name: Auto-label Dependabot PRs

# Dependabot opens PRs without a "changelog:" label, which fails the
# "Validate single changelog label" check. Add one automatically so these
# PRs are mergeable without manual intervention.
#
# Note: pull_request_target (not pull_request) is required because workflows
# triggered by Dependabot receive a read-only GITHUB_TOKEN on pull_request
# events. pull_request_target runs in the base-repo context, where the
# permissions block below grants the write access needed to label the PR.
# This job only edits labels and never checks out or runs PR code.
on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  label-dependabot-prs:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Add changelog label to Dependabot PRs
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Idempotent: only add a label if the PR has no changelog label yet,
          # so a human override is never clobbered.
          HAS_CHANGELOG=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name | select(startswith("changelog:"))] | length')
          if [ "$HAS_CHANGELOG" -eq 0 ]; then
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "changelog: dev"
            echo "Added \"changelog: dev\" label to Dependabot PR #$PR_NUMBER"
          else
            echo "PR #$PR_NUMBER already has a changelog label, skipping"
          fi
