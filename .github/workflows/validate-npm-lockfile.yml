name: Validate npm lockfile

on:
  pull_request:

permissions:
  contents: read

jobs:
  npm-ci:
    name: npm ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify lockfile install
        run: npm ci
