name: Shared Build Plugin Artifact

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string

      pr_number:
        required: false
        type: number


jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache-dependency-path: './package-lock.json'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci || npm install
          composer install
      
      - name: Build plugin
        run: npm run build
      
      - name: Extract built plugin for artifact upload
        run: unzip facebook-for-woocommerce.zip -d artifact-contents
      
      - name: Store built plugin
        uses: actions/upload-artifact@v5
        continue-on-error: true
        with:
          name: facebook-for-woocommerce
          path: artifact-contents
          
      - name: Check if build succeeded
        id: check_build
        run: |
          if [ -f "facebook-for-woocommerce.zip" ]; then
            echo "build_success=true" >> $GITHUB_OUTPUT
            echo "filesize=$(du -h facebook-for-woocommerce.zip | cut -f1)" >> $GITHUB_OUTPUT
          else
            echo "build_success=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create simple summary
        run: echo "⬇️ Scroll to the bottom of this page and download the 'facebook-for-woocommerce' artifact to get the latest plugin build." > $GITHUB_STEP_SUMMARY
        
      - name: Post build info comment on PR
        if: inputs.pr_number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          BUILD_SUCCESS: ${{ steps.check_build.outputs.build_success }}
          FILESIZE: ${{ steps.check_build.outputs.filesize }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SHORT_SHA=${COMMIT_SHA:0:7}

          if [ "$BUILD_SUCCESS" = "true" ]; then
            COMMENT_BODY="## 📦 Latest Plugin Build

          **Built at:** ${TIMESTAMP}
          **Commit:** ${SHORT_SHA}
          **Size:** ${FILESIZE}

          **Download:** [Click here to download the plugin](${RUN_URL})

          _To download: Click the link above → Scroll to bottom → Download \"facebook-for-woocommerce\" artifact_"
          else
            COMMENT_BODY="## ❌ Plugin Build Failed

          **Attempted at:** ${TIMESTAMP}
          **Commit:** ${SHORT_SHA}

          Please check the [workflow logs](${RUN_URL}) for more information."
          fi

          # Find existing build comment and update or create
          EXISTING_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --paginate --jq '.[] | select(.body | test("## 📦 Latest Plugin Build|## ❌ Plugin Build Failed")) | .id' | head -1)

          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING_ID}" -X PATCH -f body="$COMMENT_BODY" || echo "Unable to update comment."
            echo "Updated existing comment ID: $EXISTING_ID"
          else
            gh pr comment "$PR_NUMBER" --body "$COMMENT_BODY" || echo "Unable to create comment. Build information is still available in the workflow summary."
            echo "Created new comment"
          fi