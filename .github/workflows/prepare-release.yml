name: "Prepare New Release"
run-name: Prepare New Release ${{ github.event.inputs.version && format('release/{0}', github.event.inputs.version) || github.ref_name }} by @${{ github.actor }}


on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number to be released"
        required: true
  push:
    branches:
      - 'release/[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prepare-release:
    name: Prepare Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
            token: ${{ secrets.GITHUB_TOKEN }}
            fetch-depth: 0

      - name: Set Version
        id: set_version
        env:
          NEW_VERSION: ${{ github.event.inputs.version }}
        run: echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if branch exists
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.set_version.outputs.new_version }}
        run: |
          if gh api "repos/${{ github.repository }}/branches/release/$NEW_VERSION" --silent 2>/dev/null; then
            echo "::error::Branch \"release/$NEW_VERSION\" already exists."
            exit 1
          fi
          echo "✅ Branch \"release/$NEW_VERSION\" does not exist."

      - name: Get latest release tag
        id: get_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view --json tagName --jq '.tagName')
          git fetch origin tag "$TAG"
          TAG_COMMIT_TIMESTAMP=$(git log -1 --format=%ct "$TAG")
          echo "Latest release tag: $TAG"
          echo "Latest release tag commit timestamp: $TAG_COMMIT_TIMESTAMP"
          echo "latest_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag_commit_timestamp=$TAG_COMMIT_TIMESTAMP" >> "$GITHUB_OUTPUT"

      - name: Build changelog from PRs
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_CUTOFF_TIMESTAMP: ${{ steps.get_release.outputs.tag_commit_timestamp }}
          NEW_VERSION: ${{ steps.set_version.outputs.new_version }}
        run: |
          CHANGELOG=""
          while IFS=$'\t' read -r DATE LABEL PR_TITLE PR_AUTHOR PR_NUM; do
            [ -z "$PR_NUM" ] && continue

            # Capitalize first letter
            LABEL="$(echo "${LABEL:0:1}" | tr '[:lower:]' '[:upper:]')${LABEL:1}"
            CHANGELOG="${CHANGELOG}* ${LABEL} - ${PR_TITLE} by @${PR_AUTHOR} in #${PR_NUM}\n"
          done < <(
            gh pr list --state closed --base main --limit 1000 --json number,title,author,labels,mergedAt,closedAt --jq '
              .[]
              | . as $pr
              | ($pr.mergedAt // $pr.closedAt) as $date
              | ([.labels[].name | ascii_downcase] | index("merged")) as $hasMergedLabel
              | (any(.labels[].name; ascii_downcase | test("^changelog:[[:space:]]*none$"))) as $hasChangelogNone
              | select(($pr.mergedAt != null) or $hasMergedLabel)
              | select($hasChangelogNone | not)
              | select(($date | fromdateiso8601) > (env.RELEASE_CUTOFF_TIMESTAMP | tonumber))
              | ([.labels[].name | ascii_downcase | select(startswith("changelog:")) | sub("^changelog:[[:space:]]*"; "")][0] // "") as $label
              | select($label != "")
              | select((.title | test("^release\\s+[0-9]+\\.[0-9]+\\.[0-9]+"; "i")) | not)
              | [$date, $label, .title, .author.login, (.number | tostring)]
              | @tsv
            ' | sort
          )

          TODAY=$(date -u +%Y-%m-%d)
          OUTPUT="= ${NEW_VERSION} - ${TODAY} =\n${CHANGELOG}"
          echo "$OUTPUT"

          # Write to output using a file to handle multiline
          {
            echo "changelog<<EOF"
            echo -e "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create new branch locally
        env:
          NEW_VERSION: ${{ steps.set_version.outputs.new_version }}
        run: |
          git checkout -b "release/$NEW_VERSION"

      - name: Update package.json
        env:
          NEW_VERSION: ${{ steps.set_version.outputs.new_version }}
        run: |
          sed -i -E "s/^  \"version\":[[:space:]]*\"[^\"]*\"[[:space:]]*,/  \"version\": \"$NEW_VERSION\",/" "package.json"
          git diff

      - name: Update composer.json
        env:
          NEW_VERSION: ${{ steps.set_version.outputs.new_version }}
        run: |
          # Add or update version field after the "name" field in composer.json
          if grep -q '"version":' composer.json; then
            sed -i -E "s/\"version\":[[:space:]]*\"[^\"]*\"/\"version\": \"$NEW_VERSION\"/" "composer.json"
          else
            sed -i -E "s/(\"name\":[[:space:]]*\"[^\"]*\",)/\1\n  \"version\": \"$NEW_VERSION\",/" "composer.json"
          fi
          git diff

      - name: Update facebook-for-woocommerce.php
        env:
          NEW_VERSION: ${{ steps.set_version.outputs.new_version }}
        run: |
          sed -i -E "s/^ \* Version:.*/ \* Version: $NEW_VERSION/" "facebook-for-woocommerce.php"
          sed -i -E "s/^([[:space:]]*const PLUGIN_VERSION = ')[^']*(';.*)/\1$NEW_VERSION\2/" "facebook-for-woocommerce.php"
          git diff

      - name: Update WP and WC tested up to versions
        run: |
          # Fetch latest WordPress version (X.Y.Z)
          LATEST_WP=$(curl -s 'https://api.wordpress.org/core/version-check/1.7/' | jq -r '.offers[0].version')
          echo "Latest WordPress version: $LATEST_WP"

          # Fetch latest WooCommerce version (X.Y.Z)
          LATEST_WC=$(curl -s 'https://api.wordpress.org/plugins/info/1.0/woocommerce.json' | jq -r '.version')
          echo "Latest WooCommerce version: $LATEST_WC"

          # Update Tested up to (WordPress) in facebook-for-woocommerce.php
          sed -i -E "s/^ \* Tested up to:.*/ \* Tested up to: $LATEST_WP/" "facebook-for-woocommerce.php"

          # Update WC tested up to in facebook-for-woocommerce.php
          sed -i -E "s/^ \* WC tested up to:.*/ \* WC tested up to: $LATEST_WC/" "facebook-for-woocommerce.php"

          # Update Tested up to in readme.txt
          sed -i -E "s/^Tested up to:.*$/Tested up to: $LATEST_WP/" "readme.txt"

          git diff

      - name: Check for WP/WC deprecations affecting the plugin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Fetch latest versions (same as previous step)
          LATEST_WP_FULL=$(curl -s 'https://api.wordpress.org/core/version-check/1.7/' | jq -r '.offers[0].version')
          LATEST_WP=$(echo "$LATEST_WP_FULL" | cut -d. -f1,2)
          LATEST_WC_FULL=$(curl -s 'https://api.wordpress.org/plugins/info/1.0/woocommerce.json' | jq -r '.version')
          LATEST_WC=$(echo "$LATEST_WC_FULL" | cut -d. -f1,2)
          echo "🔍 Checking deprecations for WP $LATEST_WP / WC $LATEST_WC"

          # 2. Fetch release notes
          # WooCommerce: from GitHub releases API
          WC_NOTES=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/woocommerce/woocommerce/releases" \
            | jq -r --arg ver "$LATEST_WC" '[.[] | select(.tag_name | startswith($ver))][0].body // ""')

          # WordPress: from wordpress.org news REST API
          WP_NOTES=$(curl -s "https://wordpress.org/news/wp-json/wp/v2/posts?search=${LATEST_WP}&per_page=5" \
            | jq -r '.[].content.rendered // ""' | sed 's/<[^>]*>//g')

          # WooCommerce developer changelog
          WC_DEV_NOTES=$(curl -s "https://developer.woocommerce.com/wp-json/wp/v2/posts?search=${LATEST_WC}&per_page=10" \
            | jq -r '.[].content.rendered // ""' 2>/dev/null | sed 's/<[^>]*>//g' || true)

          ALL_NOTES="${WC_NOTES}
          ${WP_NOTES}
          ${WC_DEV_NOTES}"

          # 3. Extract deprecation mentions
          DEPRECATION_LINES=$(echo "$ALL_NOTES" | grep -i "deprecat" || true)

          if [ -z "$DEPRECATION_LINES" ]; then
            echo "✅ No deprecation mentions found in WP $LATEST_WP / WC $LATEST_WC release notes"
            exit 0
          fi

          echo "📋 Found deprecation mentions in release notes:"
          echo "$DEPRECATION_LINES"

          # 4. Extract function/hook/class names (backtick-wrapped identifiers)
          DEPRECATED_NAMES=$(echo "$DEPRECATION_LINES" \
            | grep -oE '`[a-zA-Z_][a-zA-Z0-9_:]*(\(\))?`' \
            | tr -d '`' | sed 's/()//' | sort -u || true)

          if [ -z "$DEPRECATED_NAMES" ]; then
            echo "ℹ️ Deprecation mentions found but no specific function/hook names could be extracted"
            echo "   Review the release notes manually for WP $LATEST_WP / WC $LATEST_WC"
            exit 0
          fi

          echo "🔍 Extracted deprecated identifiers:"
          echo "$DEPRECATED_NAMES"

          # 5. Search plugin codebase for usage of deprecated items
          AFFECTED=""
          while IFS= read -r name; do
            [ -z "$name" ] && continue
            MATCHES=$(grep -rl --include="*.php" "$name" includes/ facebook-for-woocommerce.php 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              FILES=$(echo "$MATCHES" | tr '\n' ', ' | sed 's/,$//')
              AFFECTED="${AFFECTED}- \`${name}\` found in: ${FILES}\n"
            fi
          done <<< "$DEPRECATED_NAMES"

          if [ -z "$AFFECTED" ]; then
            echo "✅ Deprecated items found in release notes but none are used in this plugin"
            exit 0
          fi

          echo "⚠️ Found deprecated items used in the plugin:"
          echo -e "$AFFECTED"

          # 6. Check for existing GH issue
          ISSUE_TITLE="[Deprecation Check] WP $LATEST_WP / WC $LATEST_WC"

          # Ensure label exists
          gh label create "deprecation-check" \
            --description "Tracks deprecated WP/WC usage found during release" \
            --color "FBCA04" 2>/dev/null || true

          # Check for closed issue (already addressed / false positive)
          CLOSED_ISSUE=$(gh issue list \
            --label "deprecation-check" \
            --search "\"$ISSUE_TITLE\" in:title" \
            --state closed \
            --json url \
            --jq '.[0].url // ""' 2>/dev/null || true)

          if [ -n "$CLOSED_ISSUE" ]; then
            echo "⚠️ WARNING: Deprecations detected but already addressed in closed issue:"
            echo "   $CLOSED_ISSUE"
            echo "   Proceeding with release."
            exit 0
          fi

          # Check for open issue (still unaddressed)
          OPEN_ISSUE=$(gh issue list \
            --label "deprecation-check" \
            --search "\"$ISSUE_TITLE\" in:title" \
            --state open \
            --json url \
            --jq '.[0].url // ""' 2>/dev/null || true)

          if [ -n "$OPEN_ISSUE" ]; then
            echo "❌ Deprecations detected and tracked in open issue:"
            echo "   $OPEN_ISSUE"
            echo "   Address the deprecations and close the issue to unblock the release."
            exit 1
          fi

          # Create new issue with details
          BODY_FILE=$(mktemp)
          cat > "$BODY_FILE" << EOF
          ## Deprecation Check: WP $LATEST_WP / WC $LATEST_WC

          The following deprecated functions/hooks/classes were found in the plugin codebase:

          $(echo -e "$AFFECTED")

          ### Deprecation context from release notes
          \`\`\`
          $(echo "$DEPRECATION_LINES" | head -20)
          \`\`\`

          ### Action required
          Review each usage and update the code to use the recommended replacements.
          Once addressed (or confirmed as false positive), close this issue to allow the release to proceed.

          _This issue was automatically created by the prepare-release workflow._
          EOF

          NEW_ISSUE_URL=$(gh issue create \
            --title "$ISSUE_TITLE" \
            --label "deprecation-check" \
            --body-file "$BODY_FILE")
          rm -f "$BODY_FILE"

          echo "❌ Created deprecation tracking issue: $NEW_ISSUE_URL"
          echo "   Address the deprecations and close the issue to unblock the release."
          exit 1

      - name: Update changelog.txt
        env:
          CHANGELOG_TEXT: ${{ steps.changelog.outputs.changelog }}
        run: |
          # Insert changelog after line 2 of changelog.txt
          {
            head -n 2 changelog.txt
            echo "$CHANGELOG_TEXT"
            tail -n +3 changelog.txt
          } > changelog.tmp
          mv changelog.tmp changelog.txt

      - name: Set latest stable version in readme.txt
        run: |
          echo "Getting the current stable version"
          CURRENT_STABLE=$(curl 'https://api.wordpress.org/plugins/info/1.2/?action=plugin_information&request%5Bslug%5D=facebook-for-woocommerce' | jq -r '.version')
          echo "Current stable version: ${CURRENT_STABLE}"
          sed -i -E "s/^(Stable tag:)[[:space:]]*[0-9.]+/\1 $CURRENT_STABLE/" "readme.txt"

      - name: Update readme.txt
        env:
          CHANGELOG_TEXT: ${{ steps.changelog.outputs.changelog }}
        run: |
          # Find the "== Changelog ==" marker line number
          MARKER_LINE=$(grep -in '== changelog ==' readme.txt | head -1 | cut -d: -f1)
          if [ -z "$MARKER_LINE" ]; then
            echo "::error::Marker '== Changelog ==' not found in readme.txt"
            exit 1
          fi

          # Remove all empty lines, "=" lines, and "*" lines after the marker
          NEXT_LINE=$((MARKER_LINE + 1))
          END_LINE=$NEXT_LINE
          TOTAL=$(wc -l < readme.txt)
          while [ "$END_LINE" -le "$TOTAL" ]; do
            LINE=$(sed -n "${END_LINE}p" readme.txt)
            TRIMMED=$(echo "$LINE" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [ -z "$TRIMMED" ] || [[ "$TRIMMED" == =* ]] || [[ "$TRIMMED" == \** ]]; then
              END_LINE=$((END_LINE + 1))
            else
              break
            fi
          done

          # Rebuild file: before marker (inclusive) + new changelog + rest of file
          {
            head -n "$MARKER_LINE" readme.txt
            echo ""
            echo "$CHANGELOG_TEXT"
            tail -n +"$END_LINE" readme.txt
          } > readme.tmp
          mv readme.tmp readme.txt

      - name: Commit and Push
        env:
          NEW_VERSION: ${{ steps.set_version.outputs.new_version }}
        run: |
          git diff
          git add .
          git commit -m "Updating version to $NEW_VERSION"
          git push origin HEAD

  build-and-upload:
    needs: prepare-release
    if: always() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped')
    uses: ./.github/workflows/shared-build-plugin-artifact.yml
    with:
      ref: ${{ github.event_name == 'push' && github.ref || format('refs/heads/release/{0}', github.event.inputs.version) }}
