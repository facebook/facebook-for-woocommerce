name: Set Stable Tag

on:
  workflow_dispatch:
    branches:
      - 'release/p*/publish'
    inputs:
      instructions:
        description: 'Choose from branches that follow this pattern: release/p*/publish'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  set-stable-tag:
    runs-on: ubuntu-latest
    environment: Deployment
    outputs:
      version: ${{ steps.package-version.outputs.current-version }}
    steps:
      - uses: actions/checkout@v5

      - name: Fail if not on a release publish branch
        run: |
          echo "Current ref: ${{ github.ref }}"
          BRANCH="${{ github.ref }}"
          if [[ ! $BRANCH == refs/heads/release/p*/publish ]]; then
            echo "❌ This workflow can only be run on release/p*/publish branches."
            exit 1
          fi

      - name: Get NPM Version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1

      - name: Compare marketplace artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.package-version.outputs.current-version }}
        run: |
          set -e

          TEMP_DIR=$(mktemp -d)
          trap "rm -rf $TEMP_DIR" EXIT

          echo "🔍 Verifying that the WordPress.org marketplace build matches the latest changes on release/$VERSION (Meta for WooCommerce v$VERSION)"

          # Download the currently published plugin from WordPress.org
          echo "⬇️  Downloading the published plugin from the WordPress.org marketplace..."
          curl -sL "https://downloads.wordpress.org/plugin/facebook-for-woocommerce.zip" -o "$TEMP_DIR/marketplace.zip"

          # Resolve the exact commit currently at the tip of release/$VERSION. We must
          # compare the marketplace against a build of THIS commit so we never validate
          # against a stale or still-running build of an older commit.
          BRANCH_SHA=$(gh api "repos/facebook/facebook-for-woocommerce/branches/release/$VERSION" --jq '.commit.sha')
          echo "📌 Latest commit on release/$VERSION is $BRANCH_SHA"

          # Locate the build artifact for that exact commit.
          # build-plugin-artifact.yml builds on every push to the release branch (and is
          # dispatched by prepare-release.yml for the branch's first commit), so a build
          # for the current HEAD is always produced. It may still be in progress when this
          # workflow runs, so poll for up to 5 minutes for a SUCCESSFUL build whose commit
          # SHA matches release/$VERSION's HEAD before giving up.
          echo "🔎 Looking for a successful build of release/$VERSION at commit $BRANCH_SHA..."
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=10
          RUN_ID=""
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
              RUN_ID=$(gh run list --repo facebook/facebook-for-woocommerce --workflow build-plugin-artifact.yml --branch "release/$VERSION" --status success --limit 50 --json databaseId,headSha --jq "[.[] | select(.headSha == \"$BRANCH_SHA\")][0].databaseId")
              if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
                  echo "✅ Found successful build (run id $RUN_ID) for commit $BRANCH_SHA"
                  break
              fi
              RUN_ID=""
              echo "⏳ No successful build for commit $BRANCH_SHA yet — it may still be running. Waiting ${SLEEP_SECONDS}s (attempt ${ATTEMPT}/${MAX_ATTEMPTS})..."
              sleep "$SLEEP_SECONDS"
          done

          if [ -z "$RUN_ID" ]; then
              echo "❌ Could not find a successful build of release/$VERSION at commit $BRANCH_SHA after $((MAX_ATTEMPTS * SLEEP_SECONDS / 60)) minutes."
              echo "   This usually means one of the following:"
              echo "     • The build for this commit is still running or queued — wait for it to finish, then re-run this workflow."
              echo "     • The build for this commit failed — check the 'Build Plugin Artifact' workflow runs for release/$VERSION and fix the build."
              echo "     • No build was ever triggered for this commit — trigger one with:"
              echo "         gh workflow run build-plugin-artifact.yml --ref release/$VERSION"
              echo "       then wait for it to succeed and re-run this workflow."
              exit 1
          fi

          echo "⬇️  Downloading the build artifact from run $RUN_ID..."
          gh run download "$RUN_ID" --repo facebook/facebook-for-woocommerce --dir "$TEMP_DIR/artifact"

          # Find and prepare GitHub zip
          ARTIFACT_ZIP=$(find "$TEMP_DIR/artifact" -name "*.zip" -type f | head -1)
          if [ -z "$ARTIFACT_ZIP" ]; then
              PLUGIN_FILE=$(find "$TEMP_DIR/artifact" -name "facebook-for-woocommerce.php" -type f | head -1)
              if [ -n "$PLUGIN_FILE" ]; then
                  PLUGIN_DIR=$(dirname "$PLUGIN_FILE")
                  (cd "$(dirname "$PLUGIN_DIR")" && zip -rq "$TEMP_DIR/github.zip" "$(basename "$PLUGIN_DIR")")
                  ARTIFACT_ZIP="$TEMP_DIR/github.zip"
              fi
          fi
          if [ -z "$ARTIFACT_ZIP" ]; then
              echo "❌ The build artifact from run $RUN_ID did not contain a plugin zip or a facebook-for-woocommerce.php file."
              echo "   The artifact may be malformed or incomplete. Inspect run $RUN_ID, then re-run this workflow."
              exit 1
          fi

          # Extract and compare
          mkdir -p "$TEMP_DIR/wp" "$TEMP_DIR/gh"
          unzip -q "$TEMP_DIR/marketplace.zip" -d "$TEMP_DIR/wp"
          unzip -q "$ARTIFACT_ZIP" -d "$TEMP_DIR/gh"

          # Compare directories. The Release Plugin deploy strips .github dirs from
          # trunk before committing to SVN (find trunk -type d -name .github -delete),
          # so WordPress.org never has them while the faithful build artifact does
          # (they ship inside vendored deps). Exclude .github here to mirror the deploy.
          echo "🔬 Comparing the marketplace plugin against the release/$VERSION build (commit $BRANCH_SHA)..."
          DIFF_OUTPUT=$(diff -rq --exclude='.github' "$TEMP_DIR/wp" "$TEMP_DIR/gh" 2>&1 || true)

          # For .pot files, check if differences are only timestamps
          REAL_DIFFS=""
          while IFS= read -r line; do
              if echo "$line" | grep -q '\.pot '; then
                  # Extract the two file paths and do a content diff ignoring timestamp lines
                  FILE_A=$(echo "$line" | sed 's/^Files \(.*\) and .* differ$/\1/')
                  FILE_B=$(echo "$line" | sed 's/^Files .* and \(.*\) differ$/\1/')
                  POT_DIFF=$(diff "$FILE_A" "$FILE_B" | grep -v "^[<>] \"POT-Creation-Date:" | grep -v "^[<>] \"PO-Revision-Date:" | grep "^[<>]" || true)
                  if [ -n "$POT_DIFF" ]; then
                      REAL_DIFFS="${REAL_DIFFS}${line}\n"
                  fi
              else
                  REAL_DIFFS="${REAL_DIFFS}${line}\n"
              fi
          done <<< "$DIFF_OUTPUT"

          REAL_DIFFS=$(echo -e "$REAL_DIFFS" | sed '/^$/d')

          if [ -n "$REAL_DIFFS" ]; then
              echo "❌ The WordPress.org marketplace build does NOT match the latest release/$VERSION build (commit $BRANCH_SHA)."
              echo "   Refusing to set the stable tag until they match. Differing files:"
              echo "$REAL_DIFFS"

              # Determine which version WordPress.org is actually serving. If it is not
              # $VERSION, the "Release Plugin" deploy almost certainly has not run yet,
              # which is the most common reason this step fails — call that out explicitly
              # instead of leaving the operator to interpret a list of differing files.
              WP_VERSION=$(grep -oiP '^\s*\*\s*Version:\s*\K[0-9][0-9.]*' "$TEMP_DIR/wp/facebook-for-woocommerce/facebook-for-woocommerce.php" 2>/dev/null | head -1)
              echo ""
              if [ -n "$WP_VERSION" ] && [ "$WP_VERSION" != "$VERSION" ]; then
                  echo "::error::WordPress.org is still serving v${WP_VERSION}, not v${VERSION} — the Release Plugin deploy for this release has not been published yet."
                  echo "   This workflow only sets the stable tag; it does NOT deploy the plugin. The deploy is a prior step."
                  echo "   The 'Release Plugin' deploy is most likely still pending approval on the 'Deployment' environment (or it failed)."
                  echo "   To fix:"
                  echo "     1. Open the 'Release Plugin' workflow run for branch release/p${VERSION}/publish and approve/complete the Deployment."
                  echo "     2. Wait for WordPress.org to serve v${VERSION} (it updates after the deploy commits to SVN)."
                  echo "     3. Re-run this 'Set Stable Tag' workflow."
                  echo "   Re-running this workflow before the deploy finishes will keep failing here."
              else
                  echo "::error::WordPress.org is serving v${WP_VERSION:-$VERSION} but its contents differ from the release/$VERSION build (commit $BRANCH_SHA)."
                  echo "   The deployed artifact is out of date for this commit. Re-run the 'Release Plugin' deploy for release/p${VERSION}/publish, wait for WordPress.org to update, then re-run this workflow."
              fi
              exit 1
          fi

          echo "✅ The marketplace build matches the latest release/$VERSION build (commit $BRANCH_SHA) — safe to set the stable tag."

      - name: Install SVN
        run: sudo apt-get install subversion -y

      - name: Checkout SVN Repository
        run: svn co https://plugins.svn.wordpress.org/facebook-for-woocommerce/ woocommerce_svn --quiet --non-interactive

      - name: Validate SVN tag
        env:
          VERSION: ${{ steps.package-version.outputs.current-version }}
        run: |
          if [ ! -d "woocommerce_svn/tags/$VERSION" ]; then
            echo "::error::SVN tag tags/$VERSION does not exist on WordPress.org." 1>&2
            echo "   The 'Release Plugin' deploy creates this tag, so this means the deploy has not run for v$VERSION." 1>&2
            echo "   Run/approve the 'Release Plugin' workflow for branch release/p$VERSION/publish and wait for it to finish, then re-run this workflow." 1>&2
            exit 1
          fi
          echo "✅ SVN tag tags/$VERSION exists."

      - name: Update readme.txt
        env:
          NEW_VERSION: ${{ steps.package-version.outputs.current-version}}
        run: |
          cd woocommerce_svn
          if [ -z "$NEW_VERSION" ]; then
            echo "::error::Resolved version is empty; refusing to blank the Stable tag."
            exit 1
          fi
          sed -i -E "s/^(Stable tag:)[[:space:]]*[0-9.]+/\1 $NEW_VERSION/" "trunk/readme.txt"

          # WordPress.org's readme parser fails on CRLF-only files and reads the
          # Stable tag as empty ("/tags// does not exist"). Normalize to LF and
          # verify the Stable tag resolved before committing to SVN.
          sed -i 's/\r$//' "trunk/readme.txt"
          if grep -q $'\r' "trunk/readme.txt"; then
            echo "::error::trunk/readme.txt still contains CRLF line endings after normalization."
            exit 1
          fi
          if ! grep -qx "Stable tag: $NEW_VERSION" "trunk/readme.txt"; then
            echo "::error::Stable tag was not set to $NEW_VERSION in trunk/readme.txt."
            grep -i '^stable tag:' "trunk/readme.txt" || true
            exit 1
          fi
          echo "✅ trunk/readme.txt: Stable tag $NEW_VERSION, LF line endings."

      - name: Commit to SVN
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        run: |
          cd woocommerce_svn
          cat trunk/readme.txt
          svn status
          svn diff
          svn commit -m "Update stable tag for version ${{ steps.package-version.outputs.current-version}}" --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --no-auth-cache --non-interactive

  create-release-pr:
    needs: set-stable-tag
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.set-stable-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: release/${{ needs.set-stable-tag.outputs.version }}

      - name: Set Stable tag on the release branch
        run: |
          # set-stable-tag updates the Stable tag in WordPress.org SVN, but the git
          # release branch (which merges to main) still carries the previous live
          # version that prepare-release wrote — leaving main's readme.txt Stable tag
          # perpetually behind. Now that the release is live on wp.org, bump the Stable
          # tag on this existing release/$VERSION branch so the open "Release $VERSION"
          # PR carries it to main. No new branch is created.
          if [ -z "$VERSION" ]; then
            echo "::error::VERSION is empty; refusing to update the Stable tag."
            exit 1
          fi
          sed -i -E "s/^(Stable tag:)[[:space:]]*[0-9.]+/\1 $VERSION/" readme.txt
          # WordPress.org's readme parser fails on CRLF; keep LF.
          sed -i 's/\r$//' readme.txt
          if ! grep -qx "Stable tag: $VERSION" readme.txt; then
            echo "::error::Stable tag was not set to $VERSION in readme.txt."
            grep -i '^stable tag:' readme.txt || true
            exit 1
          fi
          if git diff --quiet -- readme.txt; then
            echo "ℹ️ Stable tag already $VERSION on release/$VERSION; nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add readme.txt
            git commit -m "Set Stable tag to $VERSION"
            git push origin "HEAD:release/$VERSION"
            echo "✅ Stable tag set to $VERSION on release/$VERSION"
          fi

      - name: Update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "v$VERSION" \
            --repo facebook/facebook-for-woocommerce \
            --draft=false \
            --prerelease=false \
            --latest

      - name: Validate Git tag
        run: |
          git fetch --tags
          if [ ! $(git tag -l "v$VERSION") ]; then
            echo "❌ Git tag does not exist after publishing release" 1>&2
            exit 1
          fi

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "v$VERSION" --repo facebook/facebook-for-woocommerce --json body --jq '.body' > /tmp/release-notes.md
          EXISTING_PR=$(gh pr list --repo facebook/facebook-for-woocommerce --head "release/$VERSION" --base main --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" \
              --repo facebook/facebook-for-woocommerce \
              --title "Release $VERSION" \
              --body-file /tmp/release-notes.md \
              --add-label "changelog: none"
          else
            gh pr create \
              --repo facebook/facebook-for-woocommerce \
              --base main \
              --head "release/$VERSION" \
              --title "Release $VERSION" \
              --body-file /tmp/release-notes.md \
              --label "changelog: none"
          fi
