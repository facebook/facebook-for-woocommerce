name: Validate PR Labels

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize, reopened, edited]

jobs:
  check-label:
    name: Validate single changelog label
    runs-on: ubuntu-latest
    steps:
      - name: Validate label
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          MATCHING=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name | select(startswith("changelog:"))] | length')
          if [ "$MATCHING" -ne 1 ]; then
            echo "::error::PR must have exactly one changelog label, ${MATCHING} detected."
            exit 1
          fi
          LABEL=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name | select(startswith("changelog:"))][0]')
          echo "✅ Single changelog label: \"$LABEL\""