version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    # Apply a changelog label at PR creation so the grouped Dependabot PR
    # satisfies the "Validate single changelog label" check without manual help.
    labels:
      - "dependencies"
      - "changelog: dev"

updates:
  - package-ecosystem: npm
    directory: "/"
    multi-ecosystem-group: all-dependencies
    patterns:
      - "*"

  - package-ecosystem: composer
    directory: "/"
    multi-ecosystem-group: all-dependencies
    patterns:
      - "*"

  - package-ecosystem: github-actions
    directory: "/"
    multi-ecosystem-group: all-dependencies
    patterns:
      - "*"
